name: 🚀 Deploying Rakeez Web

on:
  push:
    branches:
      - master  # Change to 'main' if your default branch is main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the latest code
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2️⃣ Setup correct Node.js version (Vite needs >=20)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install dependencies and build
      - name: Install and build Vite React app
        run: |
          npm ci
          npm run build

      # 4️⃣ Upload 'dist' folder to EC2
      - name: Upload build files to EC2
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "dist/"
          target: "/home/ubuntu/rakeez-web/dist"

      # 5️⃣ SSH into EC2 and deploy
      - name: Deploy and restart Nginx
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "🔹 Deploying Rakeez Web to Nginx..."
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/ubuntu/rakeez-web/dist/* /var/www/html/
            sudo systemctl restart nginx
            echo "✅ Deployment complete!"
            echo "🌐 Visit your site at http://$EC2_HOST"