name: Deploy Rakeez Web

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the latest code
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2️⃣ Setup correct Node.js version (Vite needs >=20)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install dependencies and build
      - name: Install and build Vite React app
        run: |
          npm ci
          npm run build

      # 4️⃣ Upload 'dist' folder to VPS
      - name: Upload build files to VPS
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/"
          target: "/tmp/rakeez-web"

      # 5️⃣ SSH into VPS and deploy
      - name: Deploy and restart Nginx
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Deploying new build to Nginx..."
            # Make sure target folder exists
            sudo mkdir -p /var/www/html
            sudo rm -rf /var/www/html/*
            sudo cp -r /tmp/rakeez-web/dist/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html
            sudo systemctl restart nginx
            echo "Deployment complete!"